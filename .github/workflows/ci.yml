name: CMake Build

on:
  push:
    branches:
      - CI
  pull_request:
    branches:
      - CI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get install -y cmake build-essential

      - name: Set up GCC Toolset 10
        run: |
          sudo apt-get install -y centos-release-scl
          sudo apt-get install -y gcc-toolset-10
          source /opt/rh/gcc-toolset-10/enable
          export CXX=/opt/rh/gcc-toolset-10/root/usr/bin/g++
          export CC=/opt/rh/gcc-toolset-10/root/usr/bin/gcc

      - name: Create build directory
        run: mkdir build

      - name: Run CMake
        run: cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo ..
        working-directory: ./build

      - name: Build project
        run: make -j8
        working-directory: ./build
        if: success()