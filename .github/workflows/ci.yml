name: unixcommons_cobrazz_build

on:
  push:
    branches:
      - CI
  pull_request:
    branches:
      - CI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Restore cache
        uses: actions/cache/restore@v3
        with:
          path: ./cache
          key: cache-${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
          restore-keys: |
            cache-${{ runner.os }}-

      - name: Create env
        run: |
          mkdir -p ./cache
          echo "Cache initialized" > ./cache/file.txt
          echo "Cache initialized" > ./cache/file1.txt

      - name: Build
        run: ./build.sh

      - name: Save cache
        uses: actions/cache/save@v3
        if: always() # Гарантирует выполнение шага сохранения
        with:
          path: ./cache
          key: cache-${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
