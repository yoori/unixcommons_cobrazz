name: unixcommons_cobrazz build

on:
  push:
    branches:
      - CI
  pull_request:
    branches:
      - CI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
    
      - name: Set up Docker Compose
        run: |
          apt-get update
          apt-get install -y docker-compose

      - name: Making base cache
        run: |
          mkdir cache
          if [ $? -eq 0 ]; then
            docker run -it --name tmp_oracle oraclelinux:8.7

            docker cp tmp_oracle:/usr ./cache/usr
            docker cp tmp_oracle:/etc ./cache/etc
            docker cp tmp_oracle:/var ./cache/var
            docker cp tmp_oracle:/bin ./cache/bin
            docker cp tmp_oracle:/lib ./cache/lib
            docker cp tmp_oracle:/lib64 ./cache/lib64
            docker cp tmp_oracle:/sbin ./cache/sbin
            docker cp tmp_oracle:/opt ./cache/opt
            
            docker rm tmp_oracle
          else
            echo "cache folder presents. Skipping Docker cache creation."
          fi
        working-directory: ./unixcommons_cobrazz/ci/
          
      - name: Build
        run: docker-compose up -d
        working-directory: ./unixcommons_cobrazz/ci/
