name: unixcommons_cobrazz_build

on:
  push:
    branches:
      - CI
  pull_request:
    branches:
      - CI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create env
        run: |
          mkdir -p ./cache
          echo "Cache initialized" > ./cache/file.txt

      - name: Save cache
        uses: actions/cache@v3
        with:
          path: ./cache
          key: cache-${{ runner.os }}-${{ github.run_id }}
