name: unixcommons_cobrazz_build

on:
  push:
    branches:
      - CI
  pull_request:
    branches:
      - CI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Сreate env
        run: | 
            mkdir ./cache
            touch ./cache/file.txt
        working-directory: ci
        
      - name: Save cache
        uses: actions/cache@v3
        with:
          path: |
           ./ci/cache
          key: cache-${{ runner.os }}-${{ github.run_id }}  
          restore-keys: cache-${{ runner.os }}-          
