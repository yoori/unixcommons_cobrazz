name: CMake Build

on:
  push:
    branches:
      - CI
  pull_request:
    branches:
      - CI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get install -y \
          gcc-10 g++-10 \
          libace-dev \
          libbz2-dev \
          libboost-thread-dev \
          libev-dev \
          libevent-dev \
          libgtest-dev \
          libgeoip-dev \
          libiconv-hook-dev \
          libsnmp-dev \
          libnghttp2-dev \
          libssl-dev \
          libpcre3-dev \
          libprotobuf-dev protobuf-compiler \
          libxerces-c-dev \
          libgrpc-dev \
          librocksdb-dev \
          liburing-dev \
          libgrpc-dev


      - name: Copy GCC binaries to /opt/rh/gcc-toolset-10
        run: |
          sudo mkdir -p /opt/rh/gcc-toolset-10/root/usr/bin
          sudo ln -sf /usr/bin/gcc-10 /opt/rh/gcc-toolset-10/root/usr/bin/gcc
          sudo ln -sf /usr/bin/g++-10 /opt/rh/gcc-toolset-10/root/usr/bin/g++

      - name: Set up custom GCC
        run: |
          export CXX=/opt/rh/gcc-toolset-10/root/usr/bin/g++
          export CC=/opt/rh/gcc-toolset-10/root/usr/bin/gcc

      - name: Create build directory
        run: mkdir build

      - name: Run CMake
        run: cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo ..
        working-directory: ./build

      - name: Build project
        run: make -j8
        working-directory: ./build