services:
  oracle_env_creation:
    image: oraclelinux:8.7
    container_name: oracle_env_build
    tty: true
    stdin_open: true
    volumes:
      - ../:/app
      - ./cache/usr:/usr
      - ./cache/etc:/etc
      - ./cache/var:/var
      - ./cache/bin:/bin
      - ./cache/lib:/lib
      - ./cache/lib64:/lib64
      - ./cache/sbin:/sbin
      - ./cache/opt:/opt
      
    working_dir: /app/ci
    command: |
      sh -c "
      echo 'Step 1: Creating yum repository configuration...';
      "
  build:
    image: oraclelinux:8.7
    container_name: unixcommons_cobrazz_build
    tty: true
    stdin_open: true
    volumes:
      - ../:/app
      - ./cache/usr:/usr
      - ./cache/etc:/etc
      - ./cache/var:/var
      - ./cache/bin:/bin
      - ./cache/lib:/lib
      - ./cache/lib64:/lib64
      - ./cache/sbin:/sbin
      - ./cache/opt:/opt
      
    working_dir: /app/ci
    command: |
      sh -c " 
      echo 'Build process completed successfully!';
      exit 1;
      "
